<style>
  :root{
    --bg: #F4EFE3;
    --surface: #FFFFFF;
    --surface-2: #FBF8F1;
    --ink: #23281F;
    --ink-soft: #5C6252;
    --line: #DED4BC;
    --primary: #2F4A33;
    --primary-dark: #1B2B1E;
    --primary-tint: #E4EBDE;
    --accent: #B5741A;
    --accent-tint: #F4E3C4;
    --accent-dark: #8A5613;
    --danger: #A23B2E;
    --danger-tint: #F3DFD9;
    --estacon: #B5741A;
    --astillable: #4F7A52;
    --aserrio: #6E5643;
    --radius-s: 8px;
    --radius-m: 14px;
    --radius-l: 20px;
    --shadow: 0 1px 2px rgba(35,40,31,.06), 0 6px 20px rgba(35,40,31,.07);
    --font-display: "Fraunces", Georgia, serif;
    --font-body: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(circle at 100% 0%, rgba(47,74,51,.05), transparent 40%),
      radial-gradient(circle at 0% 100%, rgba(181,116,26,.05), transparent 45%);
  }
  button{ font-family:inherit; }
  input, select{ font-family:inherit; }

  ::selection{ background:var(--accent-tint); }

  /* ---------- App shell ---------- */
  #app{
    max-width:560px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  @media (min-width:860px){
    #app{
      max-width:920px;
      margin:32px auto;
      min-height:calc(100vh - 64px);
      border-radius:var(--radius-l);
      box-shadow:var(--shadow);
      overflow:hidden;
      border:1px solid var(--line);
    }
  }

  header.topbar{
    background:var(--primary);
    color:#fff;
    padding:18px 20px;
    display:flex;
    align-items:center;
    gap:14px;
    position:sticky;
    top:0;
    z-index:20;
  }
  @media (min-width:860px){ header.topbar{ position:static; } }

  header.topbar .icon-btn{
    width:38px; height:38px; flex:none;
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,.55);
    background:transparent;
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:background .15s ease;
  }
  header.topbar .icon-btn:hover{ background:rgba(255,255,255,.12); }
  header.topbar .icon-btn svg{ width:18px; height:18px; }

  header.topbar h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:22px;
    letter-spacing:.02em;
    margin:0;
    flex:1;
    text-transform:uppercase;
  }
  header.topbar .eyebrow{
    display:block;
    font-family:var(--font-body);
    font-weight:600;
    font-size:10.5px;
    letter-spacing:.14em;
    color:rgba(255,255,255,.65);
    text-transform:uppercase;
    margin-bottom:2px;
  }

  main{ flex:1; padding:20px 20px 100px; }
  @media (min-width:860px){ main{ padding:28px 40px 60px; } }

  /* ---------- Rings step indicator (signature element) ---------- */
  .rings-nav{
    display:flex; align-items:center; justify-content:center;
    gap:10px;
    padding:18px 0 6px;
  }
  .ring-step{ display:flex; align-items:center; gap:10px; }
  .ring{
    width:34px; height:34px;
    border-radius:50%;
    border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-weight:600; font-size:13px;
    color:var(--ink-soft);
    background:var(--surface);
    position:relative;
    flex:none;
  }
  .ring::before{
    content:"";
    position:absolute; inset:5px;
    border-radius:50%;
    border:1.5px solid transparent;
  }
  .ring.done{ border-color:var(--primary); color:#fff; background:var(--primary); }
  .ring.active{ border-color:var(--accent); color:var(--accent-dark); }
  .ring.active::before{ border-color:var(--accent-tint); }
  .ring-label{ font-size:12px; font-weight:600; color:var(--ink-soft); }
  .ring-step.current .ring-label{ color:var(--ink); }
  .ring-line{ width:24px; height:2px; background:var(--line); flex:none; }
  .ring-line.done{ background:var(--primary); }

  /* ---------- Home ---------- */
  .hero{
    text-align:center;
    padding:18px 8px 8px;
  }
  .hero .rings-mark{ width:86px; height:86px; margin:0 auto 14px; }
  .hero h2{
    font-family:var(--font-display);
    font-size:26px;
    font-weight:600;
    margin:0 0 6px;
  }
  .hero p{
    color:var(--ink-soft);
    font-size:14.5px;
    max-width:340px;
    margin:0 auto;
    line-height:1.5;
  }

  .btn-new{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%;
    margin:20px 0 8px;
    padding:16px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:var(--radius-m);
    font-weight:700;
    font-size:15.5px;
    letter-spacing:.02em;
    cursor:pointer;
    box-shadow:0 10px 24px -10px rgba(47,74,51,.55);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn-new:hover{ transform:translateY(-1px); box-shadow:0 14px 28px -10px rgba(47,74,51,.6); }
  .btn-new:active{ transform:translateY(0); }
  .btn-new svg{ width:20px; height:20px; }

  .stat-row{
    display:grid; grid-template-columns:1fr 1fr;
    gap:12px;
    margin:22px 0 8px;
  }
  .stat-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    padding:14px 16px;
  }
  .stat-card .n{
    font-family:var(--font-mono); font-weight:700; font-size:22px;
    color:var(--primary-dark);
  }
  .stat-card .l{
    font-size:11.5px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--ink-soft); font-weight:600; margin-top:2px;
  }

  .section-title{
    display:flex; align-items:baseline; justify-content:space-between;
    margin:28px 0 10px;
  }
  .section-title h3{
    font-family:var(--font-display); font-size:16px; font-weight:600; margin:0;
  }
  .section-title .count{ font-size:12px; color:var(--ink-soft); font-family:var(--font-mono); }

  .search-bar{
    display:flex; gap:8px; margin-bottom:14px;
  }
  .search-bar input{
    flex:1; padding:11px 14px; border-radius:var(--radius-s);
    border:1px solid var(--line); background:var(--surface);
    font-size:14px; color:var(--ink);
  }
  .search-bar input:focus{ outline:2px solid var(--accent); outline-offset:1px; }

  .empty-state{
    text-align:center; padding:40px 20px;
    color:var(--ink-soft);
    border:1.5px dashed var(--line);
    border-radius:var(--radius-m);
    font-size:14px;
  }

  .report-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-left:4px solid var(--primary);
    border-radius:var(--radius-m);
    padding:14px 16px;
    margin-bottom:10px;
    cursor:pointer;
    transition:box-shadow .15s ease, transform .12s ease;
  }
  .report-card:hover{ box-shadow:var(--shadow); transform:translateY(-1px); }
  .report-card .row1{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .report-card .finca{ font-family:var(--font-display); font-weight:600; font-size:16px; }
  .report-card .fecha{ font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); white-space:nowrap; }
  .report-card .meta{ font-size:12.5px; color:var(--ink-soft); margin-top:4px; }
  .report-card .tags{ display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .tag{
    font-size:11px; font-weight:600; padding:3px 9px; border-radius:20px;
    font-family:var(--font-mono);
  }
  .tag.estacon{ background:#F4E3C4; color:var(--accent-dark); }
  .tag.astillable{ background:#DEEBDF; color:#2C4A2E; }
  .tag.aserrio{ background:#E7E0D6; color:#4A3B2C; }

  /* ---------- Form ---------- */
  .field{ margin-bottom:18px; }
  .field label{
    display:block; font-size:12.5px; font-weight:700;
    text-transform:uppercase; letter-spacing:.06em;
    color:var(--primary-dark); margin-bottom:6px;
  }
  .field label .req{ color:var(--accent); margin-left:2px; }
  .field .hint{ font-size:11.5px; color:var(--ink-soft); margin-top:5px; }
  .field .error{ font-size:11.5px; color:var(--danger); margin-top:5px; font-weight:600; display:none; }
  .field.has-error .error{ display:block; }

  .control{
    width:100%; padding:13px 14px;
    border-radius:var(--radius-s);
    border:1.5px solid var(--line);
    background:var(--surface);
    font-size:15px; color:var(--ink);
    appearance:none;
  }
  .control:focus{ outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-tint); }
  .control.invalid{ border-color:var(--danger); }

  select.control{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%235C6252' stroke-width='2.5'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
    padding-right:38px;
  }

  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .form-actions{
    display:flex; gap:10px; margin-top:26px;
  }
  .quick-row{ display:flex; gap:10px; margin:0 0 8px; }
  .btn-sm{ padding:10px; font-size:12.5px; flex:1; }
  .btn-sm svg{ width:15px; height:15px; }
  .btn{
    flex:1; padding:14px; border-radius:var(--radius-m);
    border:none; font-weight:700; font-size:14.5px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:transform .12s ease, filter .12s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-ghost{ background:var(--surface); color:var(--ink); border:1.5px solid var(--line); }
  .btn-ghost:hover{ background:var(--surface-2); }
  .btn-danger-ghost{ background:var(--danger-tint); color:var(--danger); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }

  /* ---------- Products screen ---------- */
  .product-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    margin-bottom:14px;
    overflow:hidden;
  }
  .product-card .p-head{
    display:flex; align-items:center; gap:12px;
    padding:16px;
    border-left:6px solid var(--primary);
  }
  .product-card.estacon .p-head{ border-left-color:var(--estacon); }
  .product-card.astillable .p-head{ border-left-color:var(--astillable); }
  .product-card.aserrio .p-head{ border-left-color:var(--aserrio); }

  .p-head .p-info{ flex:1; }
  .p-head .p-name{ font-family:var(--font-display); font-weight:600; font-size:16.5px; }
  .p-head .p-sub{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .p-head .p-total{ font-family:var(--font-mono); font-size:12.5px; color:var(--ink-soft); margin-top:4px; }
  .p-head .p-total b{ color:var(--ink); }

  .add-btn{
    width:40px; height:40px; flex:none;
    border-radius:50%; border:none;
    background:var(--accent-tint); color:var(--accent-dark);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:22px; font-weight:400; line-height:1;
    transition:background .15s ease, transform .15s ease;
  }
  .add-btn:hover{ background:var(--accent); color:#fff; transform:rotate(90deg); }

  .p-items{ border-top:1px solid var(--line); }
  .p-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:11px 16px; font-size:13.5px;
    border-bottom:1px solid var(--line);
  }
  .p-item:last-child{ border-bottom:none; }
  .p-item .desc{ color:var(--ink); }
  .p-item .figs{ font-family:var(--font-mono); color:var(--ink-soft); display:flex; gap:10px; align-items:center; }
  .p-item .del{
    background:none; border:none; color:var(--danger); cursor:pointer;
    padding:4px; display:flex; align-items:center;
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(27,32,22,.5);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:100; opacity:0; pointer-events:none;
    transition:opacity .18s ease;
  }
  .overlay.open{ opacity:1; pointer-events:auto; }

  .modal{

    border-radius:20px 20px 0 0;
    padding:22px 22px 26px;
    transform:translateY(24px);

  .overlay.open .modal{ transform:translateY(0); }
  @media (min-width:640px){ .modal{ border-radius:var(--radius-l); } }

  .modal h4{

    display:flex; align-items:center; gap:8px;
  }
  .modal .swatch{ width:10px; height:10px; border-radius:50%; }

  .toast{

    padding:12px 20px; border-radius:30px; font-size:13.5px; font-weight:600;
    box-shadow:var(--shadow); z-index:200;
    opacity:0; transition:opacity .2s ease, transform .2s ease;
    pointer-events:none;
    display:flex; align-items:center; gap:8px;
  }
  .toast.show{ opacity:1; transform:translate(-50%, 0); }

  .detail-block{

  .detail-grid .d-label{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); font-weight:700; }
  .detail-grid .d-value{ font-size:14.5px; margin-top:2px; }

  footer.brand{
    text-align:center; padding:26px 20px 32px; color:var(--ink-soft);

  footer.brand img{ width:34px; margin-bottom:8px; }
  footer.brand .name{ font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--ink); }
  footer.brand .sub{ font-size:11px; letter-spacing:.03em; }

  .fab-export{

  }
  @media (min-width:860px){ .fab-export{ right:calc(50% - 460px + 20px); } }

  .visually-hidden{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }

  .net-banner{
    position:sticky; top:0; z-index:50;
    background:var(--accent); color:#fff;
    text-align:center; font-size:12.5px; font-weight:700;
    padding:0; max-height:0; overflow:hidden;
    transition:max-height .25s ease, padding .25s ease;
  }
  .net-banner.show{ padding:9px 14px; max-height:60px; }

  .bar-row{ margin-bottom:14px; }
  .bar-row:last-child{ margin-bottom:0; }
  .bar-label{ font-size:13px; font-weight:600; margin-bottom:5px; display:flex; justify-content:space-between; }
  .bar-track{ height:8px; background:var(--surface-2); border:1px solid var(--line); border-radius:20px; overflow:hidden; }
  .bar-fill{ height:100%; background:var(--primary); border-radius:20px; }
  .bar-value{ font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); margin-top:4px; text-align:right; }

  .choice-card{
    display:block; width:100%; text-align:left;
    background:var(--surface); border:1px solid var(--line); border-left:6px solid var(--primary);
    border-radius:var(--radius-m); padding:18px; margin-bottom:12px; cursor:pointer;
    transition:box-shadow .15s ease, transform .12s ease;
  }
  .choice-card:hover{ box-shadow:var(--shadow); transform:translateY(-1px); }
  .choice-name{ font-family:var(--font-display); font-weight:600; font-size:17px; }
  .choice-sub{ font-size:12.5px; color:var(--ink-soft); margin-top:4px; }

  .chart-tabs{ display:flex; gap:8px; }
  .chart-tab{
    flex:1; padding:9px 6px; border-radius:20px; border:1.5px solid var(--line);
    background:var(--surface); color:var(--ink-soft); font-size:12px; font-weight:700;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .chart-tab svg{ width:14px; height:14px; flex:none; }
  .chart-tab.active{ background:var(--primary); border-color:var(--primary); color:#fff; }
</style>

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  const now = new Date();
  return {
    id: uid(),
    supervisor: "",
    fecha: now.toISOString().slice(0,10),
    hora: now.toTimeString().slice(0,5),
    finca: "",
    equipo: "",

    creado: now.toISOString(),
  };
}

/* =========================================================
   HELPERS DE FORMATO
   ========================================================= */
function fmtNum(n){
  const v = Number(n)||0;
  return v.toLocaleString("es-CO", { minimumFractionDigits: v%1===0?0:2, maximumFractionDigits:2 });
}
function fmtFecha(fecha, hora){
  const [y,m,d] = fecha.split("-");
  return `${d}/${m}/${y}${hora? " · "+hora:""}`;
}
function totalesReporte(rep){
  return rep.items.reduce((acc,it)=>{
    acc.unidades += Number(it.unidades)||0;
    acc.toneladas += Number(it.toneladas)||0;
    return acc;
  }, {unidades:0, toneladas:0});
}
function totalesGlobales(reports){
  return reports.reduce((acc,r)=>{
    const t = totalesReporte(r);
    acc.unidades += t.unidades; acc.toneladas += t.toneladas;
    return acc;
  }, {unidades:0, toneladas:0});
}

/* =========================================================
   RENDER: RESUMEN DEL DÍA
   Agrupa lo que registraron TODAS las personas en una fecha:
   por producto, por finca y por supervisor.
   ========================================================= */
function groupBy(items, keyFn){
  const map = new Map();
  items.forEach(it=>{
    const k = keyFn(it) || "—";
    if(!map.has(k)) map.set(k, { unidades:0, toneladas:0, count:0 });
    const g = map.get(k);
    g.unidades += Number(it.unidades)||0;
    g.toneladas += Number(it.toneladas)||0;
    g.count += 1;
  });
  return [...map.entries()].sort((a,b)=> b[1].toneladas - a[1].toneladas);
}

function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

/* =========================================================
   RANGOS DE FECHA — compartido entre el resumen de Cosecha y
   el de Despachos, para que ambos manejen "Día/Semana/Mes/Rango"
   de la misma forma.
   ========================================================= */
const MESES_ES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];

function computeDateRange(modo, fecha, mes, rangoInicio, rangoFin){
  if(modo==="semana"){
    const d = new Date(fecha+"T00:00:00");
    const dow = d.getDay(); // 0=domingo … 6=sábado
    const diffToMonday = dow===0 ? -6 : 1-dow;
    const monday = new Date(d); monday.setDate(d.getDate()+diffToMonday);
    const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    return [monday.toISOString().slice(0,10), sunday.toISOString().slice(0,10)];
  }
  if(modo==="mes"){
    const [y,m] = mes.split("-").map(Number);
    const first = new Date(y, m-1, 1);
    const last = new Date(y, m, 0);
    return [first.toISOString().slice(0,10), last.toISOString().slice(0,10)];
  }
  if(modo==="rango"){
    return rangoInicio <= rangoFin ? [rangoInicio, rangoFin] : [rangoFin, rangoInicio];
  }
  return [fecha, fecha]; // "dia"
}

function formatRangeLabel(modo, desde, hasta, mes){
  if(modo==="dia") return fmtFecha(desde, "");
  if(modo==="mes"){
    const [y,m] = mes.split("-").map(Number);
    return `${MESES_ES[m-1]} de ${y}`;
  }
  const fmt = (s)=>{ const [y,m,d]=s.split("-"); return `${d}/${m}/${y}`; };
  return `${fmt(desde)} — ${fmt(hasta)}`;
}

// Un punto por día dentro de [desde,hasta]; usado por la gráfica de tendencia
// cuando el periodo es semana/mes/rango (para "día" se usan los últimos 7 días).
function eachDayInRange(desde, hasta){
  const out = [];
  let cur = new Date(desde+"T00:00:00");
  const end = new Date(hasta+"T00:00:00");
  while(cur <= end){
    out.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }
  return out;
}

// Toneladas dentro de un rango [desde,hasta], agrupadas por producto, finca o supervisor
function getResumenGroupData(desde, hasta, groupKey){
  const reports = state.reports.filter(r=>r.fecha>=desde && r.fecha<=hasta);
  const itemsRango = [];
  reports.forEach(r=> r.items.forEach(it=> itemsRango.push({...it, finca:r.finca, supervisor:r.supervisor})));

  if(groupKey==="producto"){
    return PRODUCTOS.map(p=>({
      label: p.nombre,
      value: itemsRango.filter(it=>it.productoId===p.id).reduce((a,it)=>a+(Number(it.toneladas)||0),0),
    }));
  }
  const g = groupBy(itemsRango, it=> groupKey==="finca" ? it.finca : it.supervisor);
  return g.map(([label,gr])=>({ label, value: gr.toneladas }));
}

// Toneladas totales por día. En modo "día" muestra los últimos 7 días para
// dar contexto; en semana/mes/rango muestra cada día del periodo elegido.
function getResumenTrendData(modo, fecha, desde, hasta){
  let dias;
  if(modo==="dia"){
    const end = new Date(fecha+"T00:00:00");
    dias = [];
    for(let i=6;i>=0;i--){ const dt=new Date(end); dt.setDate(dt.getDate()-i); dias.push(dt.toISOString().slice(0,10)); }
  } else {
    dias = eachDayInRange(desde, hasta);
  }
  return dias.map(key=>{
    const tot = totalesGlobales(state.reports.filter(r=>r.fecha===key));
    const [y,m,d] = key.split("-");
    return { label: `${d}/${m}`, value: tot.toneladas };
  });
}

let resumenChartInstance = null;
function drawResumenChart(){
  const canvas = document.getElementById("resumenChart");
  if(!canvas || typeof Chart === "undefined") return;
  if(resumenChartInstance){ resumenChartInstance.destroy(); resumenChartInstance = null; }

  const [desde,hasta] = computeDateRange(state.resumenModo, state.resumenFecha, state.resumenMes, state.resumenRangoInicio, state.resumenRangoFin);
  const type = state.resumenChartType; // bar | pie | line
  let labels, data;

  if(type === "line"){
    const trend = getResumenTrendData(state.resumenModo, state.resumenFecha, desde, hasta);
    labels = trend.map(t=>t.label);
    data = trend.map(t=>t.value);
  } else {
    const grouped = getResumenGroupData(desde, hasta, state.resumenChartGroup);
    labels = grouped.map(g=>g.label);
    data = grouped.map(g=>g.value);
  }

  const palette = state.resumenChartGroup==="producto" && type!=="line"
    ? [cssVar("--estacon"), cssVar("--astillable"), cssVar("--aserrio")]
    : [cssVar("--primary"), cssVar("--accent"), "#4F7A52", "#6E5643", "#8A5613", "#2C4A2E", "#B08968"];

  const chartType = type === "pie" ? "doughnut" : type; // bar | doughnut | line
  const inkSoft = cssVar("--ink-soft");
  const line = cssVar("--line");
  const ink = cssVar("--ink");
  const primary = cssVar("--primary");

  resumenChartInstance = new Chart(canvas.getContext("2d"), {
    type: chartType,
    data: {
      labels,
      datasets: [{
        label: "Toneladas",
        data,
        backgroundColor: chartType==="line" ? "rgba(47,74,51,.15)" : labels.map((_,i)=>palette[i % palette.length]),
        borderColor: chartType==="line" ? primary : "#fff",
        borderWidth: 2,
        borderRadius: chartType==="bar" ? 6 : 0,
        tension: 0.35,
        fill: chartType==="line",
        pointRadius: chartType==="line" ? 3 : 0,
        pointBackgroundColor: primary,
      }]
    },
    options: {
      responsive:true,
      maintainAspectRatio:false,
      plugins: {
        legend: { display: chartType==="doughnut", position:"bottom", labels:{ font:{family:"'Public Sans'", size:11}, color: ink, boxWidth:12, padding:14 } },
        tooltip: { callbacks: { label: (ctx)=> ` ${ctx.label}: ${fmtNum(ctx.parsed.y ?? ctx.parsed)} t` } },
      },
      scales: chartType==="doughnut" ? {} : {
        y: { beginAtZero:true, ticks:{ color: inkSoft, font:{family:"'JetBrains Mono'", size:10} }, grid:{ color: line } },
        x: { ticks:{ color: inkSoft, font:{family:"'Public Sans'", size:10} }, grid:{ display:false } },
      }
    }
  });
}

function exportResumenChartCSV(){
  const [desde,hasta] = computeDateRange(state.resumenModo, state.resumenFecha, state.resumenMes, state.resumenRangoInicio, state.resumenRangoFin);
  const type = state.resumenChartType;
  let headers, rows, filename;

  if(type === "line"){
    const trend = getResumenTrendData(state.resumenModo, state.resumenFecha, desde, hasta);
    headers = ["Fecha","Toneladas"];
    rows = [headers, ...trend.map(t=>[t.label, t.value])];
    filename = `grafico_tendencia_${desde}_a_${hasta}.csv`;
  } else {

   para que nunca se mezclen los datos de ambas secciones)
   ========================================================= */
// Número de despachos dentro de un rango, agrupados por cliente, producto o tipo
function getDespachoGroupData(desde, hasta, groupKey){
  const despachos = state.despachos.filter(d=>d.fecha>=desde && d.fecha<=hasta);
  const keyFn = groupKey==="tipo"
    ? (d)=> DESPACHO_TIPOS[d.tipo].label
    : (d)=> d[groupKey];
  const map = new Map();
  despachos.forEach(d=>{
    const k = keyFn(d) || "—";
    map.set(k, (map.get(k)||0) + 1);
  });
  return [...map.entries()].sort((a,b)=>b[1]-a[1]).map(([label,value])=>({label, value}));
}

// Número de despachos por día. En modo "día" muestra los últimos 7 días para
// dar contexto; en semana/mes/rango muestra cada día del periodo elegido.
function getDespachoTrendData(modo, fecha, desde, hasta){
  let dias;
  if(modo==="dia"){
    const end = new Date(fecha+"T00:00:00");
    dias = [];
    for(let i=6;i>=0;i--){ const dt=new Date(end); dt.setDate(dt.getDate()-i); dias.push(dt.toISOString().slice(0,10)); }
  } else {
    dias = eachDayInRange(desde, hasta);
  }
  return dias.map(key=>{
    const count = state.despachos.filter(d=>d.fecha===key).length;
    const [y,m,d] = key.split("-");
    return { label: `${d}/${m}`, value: count };
  });
}

let despachoChartInstance = null;
function drawDespachoResumenChart(){
  const canvas = document.getElementById("despachoResumenChart");
  if(!canvas || typeof Chart === "undefined") return;
  if(despachoChartInstance){ despachoChartInstance.destroy(); despachoChartInstance = null; }

  const [desde,hasta] = computeDateRange(state.despachoResumenModo, state.despachoResumenFecha, state.despachoResumenMes, state.despachoResumenRangoInicio, state.despachoResumenRangoFin);
  const type = state.despachoResumenChartType; // bar | pie | line
  let labels, data;

  if(type === "line"){
    const trend = getDespachoTrendData(state.despachoResumenModo, state.despachoResumenFecha, desde, hasta);
    labels = trend.map(t=>t.label);
    data = trend.map(t=>t.value);
  } else {
    const grouped = getDespachoGroupData(desde, hasta, state.despachoResumenChartGroup);
    labels = grouped.map(g=>g.label);
    data = grouped.map(g=>g.value);
  }

  const palette = [cssVar("--accent"), cssVar("--primary"), "#4F7A52", "#6E5643", "#8A5613", "#2C4A2E", "#B08968"];
  const chartType = type === "pie" ? "doughnut" : type;
  const inkSoft = cssVar("--ink-soft");
  const line = cssVar("--line");
  const ink = cssVar("--ink");
  const accent = cssVar("--accent");

  despachoChartInstance = new Chart(canvas.getContext("2d"), {
    type: chartType,
    data: {
      labels,
      datasets: [{
        label: "Despachos",
        data,
        backgroundColor: chartType==="line" ? "rgba(181,116,26,.15)" : labels.map((_,i)=>palette[i % palette.length]),
        borderColor: chartType==="line" ? accent : "#fff",
        borderWidth: 2,
        borderRadius: chartType==="bar" ? 6 : 0,
        tension: 0.35,
        fill: chartType==="line",
        pointRadius: chartType==="line" ? 3 : 0,
        pointBackgroundColor: accent,
      }]
    },
    options: {
      responsive:true,
      maintainAspectRatio:false,
      plugins: {
        legend: { display: chartType==="doughnut", position:"bottom", labels:{ font:{family:"'Public Sans'", size:11}, color: ink, boxWidth:12, padding:14 } },
        tooltip: { callbacks: { label: (ctx)=> ` ${ctx.label}: ${fmtNum(ctx.parsed.y ?? ctx.parsed)} despacho${(ctx.parsed.y ?? ctx.parsed)===1?"":"s"}` } },
      },
      scales: chartType==="doughnut" ? {} : {
        y: { beginAtZero:true, ticks:{ stepSize:1, color: inkSoft, font:{family:"'JetBrains Mono'", size:10} }, grid:{ color: line } },
        x: { ticks:{ color: inkSoft, font:{family:"'Public Sans'", size:10} }, grid:{ display:false } },
      }
    }
  });
}

  const opt = (arr, val) => `<option value="">Seleccionar…</option>` + arr.map(v=>`<option value="${v}" ${v===String(val)?"selected":""}>${v}</option>`).join("");

  const fieldHtml = (campo)=>{
    const val = d[campo.name] ?? "";
    if(campo.tipo === "select"){
      return `
      <div class="field" data-field="${campo.name}">
        <label>${campo.label}${campo.req? ' <span class="req">*</span>':""}</label>
        <select class="control" id="desp_${campo.name}">${opt(campo.opciones, val)}</select>
        ${campo.req? `<div class="error">Selecciona ${campo.label.toLowerCase()}.</div>` : ""}
      </div>`;
    }
    if(campo.tipo === "number"){
      return `
      <div class="field" data-field="${campo.name}">
        <label>${campo.label}</label>
        <input class="control" type="number" id="desp_${campo.name}" min="0" step="0.01" inputmode="decimal" placeholder="0" value="${val}">
      </div>`;
    }
    return `
      <div class="field" data-field="${campo.name}">
        <label>${campo.label}</label>
        <input class="control" type="text" id="desp_${campo.name}" value="${String(val).replace(/"/g,"&quot;")}" placeholder="Ej. ${campo.label}">
      </div>`;
  };

  return `
    <header class="topbar">
      <button class="icon-btn" id="btnBack">${ICONS.back}</button>
      <div>
        <span class="eyebrow">${state.despachoEditing ? "Editar despacho" : "Nuevo despacho"}</span>
        <h1 style="font-size:19px">${cfg.label}</h1>
      </div>
    </header>
    <main>
      <form id="despachoFormEl" novalidate>
        <div class="field" data-field="fecha">
          <label>Fecha y hora <span class="req">*</span></label>
          <div class="row2">
            <input class="control" id="desp_fecha" type="date" value="${d.fecha}">
            <input class="control" id="desp_hora" type="time" value="${d.hora}">
          </div>
          <div class="error">Ingresa fecha y hora válidas.</div>
        </div>

        ${cfg.campos.map(fieldHtml).join("")}

        <div class="form-actions">
          <button type="submit" id="btnGuardarDespacho" class="btn btn-primary">${state.despachoEditing ? "Guardar cambios" : "Guardar despacho"}</button>
        </div>
      </form>
    </main>
  `;
}

function renderDespachoDetail(){
  const d = state.despachos.find(x=>x.id===state.viewingDespachoId);
  if(!d){ state.view="despachos"; return renderDespachos(); }
  const cfg = DESPACHO_TIPOS[d.tipo];

  const rows = [
    ["Cliente", d.cliente],
    ["Producto", d.producto],
    ...(d.tipo==="cosecha"
      ? [["Proceso", d.proceso]]
      : [["Diámetro/Espesor", d.diametro], ["Largo", d.largo ? d.largo+" m" : ""]]),
    ["Fecha", fmtFecha(d.fecha, d.hora)],
    ["Remisión", d.remision],
    ["Placa", d.placa],
    [cfg.unidadLabel, d.tipo==="cosecha"
      ? (d.toneladas ? fmtNum(d.toneladas)+" t" : "")
      : (d.unidades ? fmtNum(d.unidades)+" u" : "")],
  ];

  return `
    <header class="topbar">
      <button class="icon-btn" id="btnBack">${ICONS.back}</button>
      <div>
        <span class="eyebrow">${cfg.label}</span>
        <h1 style="font-size:19px">${d.cliente || "Despacho"}</h1>
      </div>
      <button class="icon-btn" id="btnEditDespacho" title="Editar">${ICONS.edit}</button>
      <button class="icon-btn" id="btnDelDespacho" title="Eliminar" style="border-color:var(--danger); color:#ffd9d0">${ICONS.trash}</button>
    </header>
    <main>
      <div class="detail-block">
        <div class="detail-grid">
          ${rows.map(([label,val])=>`<div><div class="d-label">${label}</div><div class="d-value">${val || "—"}</div></div>`).join("")}
        </div>
      </div>
    </main>
  `;
}

function openAddItemModal(productoId){
  const p = productoById(productoId);
  const overlay = document.getElementById("overlay");
  const modal = document.getElementById("modal");
  modal.innerHTML = `
    <h4><span class="swatch" style="background:var(--${p.clase})"></span>Agregar ${p.nombre}</h4>
    <form id="itemForm">
      <div class="field">
        <label>Medida <span class="req">*</span></label>
        <select class="control" name="medida" required>
          <option value="">Seleccionar…</option>
          ${p.medidas.map(m=>`<option value="${m}">${m}</option>`).join("")}
        </select>
      </div>
      <div class="row2">
        <div class="field">
          <label>Unidades <span class="req">*</span></label>
          <input class="control" type="number" name="unidades" min="0" step="1" inputmode="numeric" placeholder="0" required>
        </div>
        <div class="field">
          <label>Toneladas <span class="req">*</span></label>
          <input class="control" type="number" name="toneladas" min="0" step="0.01" inputmode="decimal" placeholder="0.00" required>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="btnCancelItem">Cancelar</button>
        <button type="submit" class="btn btn-primary">Agregar</button>
      </div>
    </form>
  `;
  overlay.classList.add("open");

  modal.querySelector("#btnCancelItem").onclick = closeModal;
  modal.querySelector("#itemForm").onsubmit = (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const medida = fd.get("medida");
    const unidades = fd.get("unidades");
    const toneladas = fd.get("toneladas");
    if(!medida || unidades==="" || toneladas===""){ return; }
    state.draft.items.push({
      itemId: uid(),
      productoId: p.id,
      medida,
      unidades: Number(unidades),
      toneladas: Number(toneladas),
    });
    closeModal();
    render();
    toast(`${p.nombre} agregado`);
  };
}
function closeModal(){
  document.getElementById("overlay").classList.remove("open");
}

   RENDER PRINCIPAL + BINDINGS

// Conecta los eventos del selector de periodo (Día/Semana/Mes/Rango).
// `keys` mapea a los nombres de campo en `state` (ej. resumenModo, resumenFecha…).
function bindPeriodPicker(prefix, keys){
  document.querySelectorAll("[data-periodo]").forEach(btn=>{
    btn.onclick = ()=>{ state[keys.modo] = btn.dataset.periodo; render(); };
  });
  const fechaInput = document.getElementById(`${prefix}FechaInput`);
  if(fechaInput) fechaInput.onchange = (e)=>{ state[keys.fecha] = e.target.value; render(); };
  const mesInput = document.getElementById(`${prefix}MesInput`);
  if(mesInput) mesInput.onchange = (e)=>{ state[keys.mes] = e.target.value; render(); };
  const rangoInicioInput = document.getElementById(`${prefix}RangoInicioInput`);
  if(rangoInicioInput) rangoInicioInput.onchange = (e)=>{ state[keys.rangoInicio] = e.target.value; render(); };
  const rangoFinInput = document.getElementById(`${prefix}RangoFinInput`);
  if(rangoFinInput) rangoFinInput.onchange = (e)=>{ state[keys.rangoFin] = e.target.value; render(); };
}

function render(){
  if(state.view!=="resumen" && resumenChartInstance){
    resumenChartInstance.destroy();
    resumenChartInstance = null;
  }
  if(state.view!=="despachoResumen" && despachoChartInstance){
    despachoChartInstance.destroy();
    despachoChartInstance = null;
  }
  const app = document.getElementById("app");
  if(state.view==="home") app.innerHTML = renderHome();
  else if(state.view==="form1") app.innerHTML = renderForm1();
  else if(state.view==="form2") app.innerHTML = renderForm2();
  else if(state.view==="detail") app.innerHTML = renderDetail();
  else if(state.view==="resumen") app.innerHTML = renderResumen();
  else if(state.view==="despachos") app.innerHTML = renderDespachos();
  else if(state.view==="despachoResumen") app.innerHTML = renderDespachoResumen();
  else if(state.view==="despachoTipo") app.innerHTML = renderDespachoTipo();
  else if(state.view==="despachoForm") app.innerHTML = renderDespachoForm();
  else if(state.view==="despachoDetail") app.innerHTML = renderDespachoDetail();

  bind();
  window.scrollTo(0,0);
}

function bind(){
  if(state.view==="home"){
    document.getElementById("btnNuevo").onclick = ()=>{
      state.draft = newDraft();
      state.editing = false;
      state.view = "form1";
      render();
    };
    document.getElementById("btnResumen").onclick = ()=>{
      state.resumenFecha = new Date().toISOString().slice(0,10);
      state.resumenModo = "dia";
      state.view = "resumen";
      render();
    };
    document.getElementById("btnDespachos").onclick = ()=>{
      state.view = "despachos";
      render();
    };
    document.getElementById("btnExport").onclick = exportCSV;
    const si = document.getElementById("searchInput");
    if(si){
      si.oninput = (e)=>{ state.search = e.target.value; render(); document.getElementById("searchInput").focus(); document.getElementById("searchInput").setSelectionRange(state.search.length,state.search.length); };
    }
    document.querySelectorAll(".report-card").forEach(card=>{
      card.onclick = ()=>{ state.viewingId = card.dataset.id; state.view="detail"; render(); };
    });
  }

  if(state.view==="resumen"){
    document.getElementById("btnBack").onclick = ()=>{ state.view="home"; render(); };
    bindPeriodPicker("resumen", { modo:"resumenModo", fecha:"resumenFecha", mes:"resumenMes", rangoInicio:"resumenRangoInicio", rangoFin:"resumenRangoFin" });
    document.querySelectorAll("[data-toggle]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.dataset.toggle;
        if(state.resumenExpanded.has(id)) state.resumenExpanded.delete(id);
        else state.resumenExpanded.add(id);
        render();
      };
    });
    document.querySelectorAll(".report-card").forEach(card=>{
      card.onclick = ()=>{ state.viewingId = card.dataset.id; state.view="detail"; render(); };
    });
    document.querySelectorAll("[data-charttype]").forEach(btn=>{
      btn.onclick = ()=>{ state.resumenChartType = btn.dataset.charttype; render(); };
    });
    const groupSelect = document.getElementById("resumenGroupSelect");
    if(groupSelect){
      groupSelect.onchange = (e)=>{ state.resumenChartGroup = e.target.value; render(); };
    }
    document.getElementById("btnExportChartData").onclick = exportResumenChartCSV;
    document.getElementById("btnExportChartImage").onclick = exportResumenChartImage;
    drawResumenChart();
  }

  if(state.view==="despachos"){
    document.getElementById("btnBack").onclick = ()=>{ state.view="home"; render(); };
    document.getElementById("btnNuevoDespacho").onclick = ()=>{
      state.despachoTipo = null;
      state.despachoEditing = false;
      state.view = "despachoTipo";
      render();
    };
    document.getElementById("btnExportDespachos").onclick = exportDespachosCSV;
    document.getElementById("btnDespachoResumen").onclick = ()=>{
      state.despachoResumenFecha = new Date().toISOString().slice(0,10);
      state.despachoResumenModo = "dia";
      state.view = "despachoResumen";
      render();
    };
    const dsi = document.getElementById("despachoSearchInput");
    if(dsi){
      dsi.oninput = (e)=>{ state.despachoSearch = e.target.value; render(); document.getElementById("despachoSearchInput").focus(); document.getElementById("despachoSearchInput").setSelectionRange(state.despachoSearch.length,state.despachoSearch.length); };
    }
    document.querySelectorAll(".report-card").forEach(card=>{
      card.onclick = ()=>{ state.viewingDespachoId = card.dataset.id; state.view="despachoDetail"; render(); };
    });
  }

  if(state.view==="despachoResumen"){
    document.getElementById("btnBack").onclick = ()=>{ state.view="despachos"; render(); };
    bindPeriodPicker("despachoResumen", { modo:"despachoResumenModo", fecha:"despachoResumenFecha", mes:"despachoResumenMes", rangoInicio:"despachoResumenRangoInicio", rangoFin:"despachoResumenRangoFin" });
    document.querySelectorAll("[data-despchart]").forEach(btn=>{
      btn.onclick = ()=>{ state.despachoResumenChartType = btn.dataset.despchart; render(); };
    });
    const despGroupSelect = document.getElementById("despachoGroupSelect");
    if(despGroupSelect){
      despGroupSelect.onchange = (e)=>{ state.despachoResumenChartGroup = e.target.value; render(); };
    }
    document.getElementById("btnExportDespachoChartData").onclick = exportDespachoChartCSV;
    document.getElementById("btnExportDespachoChartImage").onclick = exportDespachoChartImage;
    document.querySelectorAll(".report-card").forEach(card=>{
      card.onclick = ()=>{ state.viewingDespachoId = card.dataset.id; state.view="despachoDetail"; render(); };
    });
    drawDespachoResumenChart();
  }

  if(state.view==="despachoTipo"){
    document.getElementById("btnBack").onclick = ()=>{ state.view="despachos"; render(); };
    document.querySelectorAll("[data-tipo]").forEach(btn=>{
      btn.onclick = ()=>{
        state.despachoTipo = btn.dataset.tipo;
        state.despachoDraft = newDespachoDraft(btn.dataset.tipo);
        state.despachoEditing = false;
        state.view = "despachoForm";
        render();
      };
    });
  }

  if(state.view==="despachoForm"){
    document.getElementById("btnBack").onclick = ()=>{
      state.view = state.despachoEditing ? "despachoDetail" : "despachos";
      state.despachoDraft = null;
      render();
    };
    const cfg = DESPACHO_TIPOS[state.despachoTipo];
    const formEl = document.getElementById("despachoFormEl");
    formEl.querySelectorAll(".control").forEach(el=>{
      const clear = ()=>{
        const wrap = el.closest(".field");
        if(wrap){ wrap.classList.remove("has-error"); el.classList.remove("invalid"); }
      };
      el.addEventListener("input", clear);
      el.addEventListener("change", clear);
    });

    const guardarDespacho = (e)=>{
      if(e) e.preventDefault();
      const vals = { fecha: document.getElementById("desp_fecha").value, hora: document.getElementById("desp_hora").value };
      cfg.campos.forEach(c=> vals[c.name] = document.getElementById(`desp_${c.name}`).value.trim());

      const checks = [{ field:"fecha", ok: !!vals.fecha && !!vals.hora }];
      cfg.campos.filter(c=>c.req).forEach(c=> checks.push({ field:c.name, ok: !!vals[c.name] }));

      let firstInvalid = null;
      checks.forEach(c=>{
        const wrap = formEl.querySelector(`[data-field="${c.field}"]`);
        if(!wrap) return;
        if(!c.ok){
          wrap.classList.add("has-error");
          wrap.querySelectorAll(".control").forEach(el=>el.classList.add("invalid"));
          if(!firstInvalid) firstInvalid = wrap;
        } else {
          wrap.classList.remove("has-error");
          wrap.querySelectorAll(".control").forEach(el=>el.classList.remove("invalid"));
        }
      });
      if(firstInvalid){
        firstInvalid.scrollIntoView({ behavior:"smooth", block:"center" });
        const el = firstInvalid.querySelector(".control");
        if(el) el.focus({ preventScroll:true });
        toast("Completa los campos obligatorios");
        return;
      }

      const wasEditing = state.despachoEditing;
      const despachoToSave = { ...state.despachoDraft, ...vals };
      if(wasEditing) despachoToSave.actualizado = new Date().toISOString();

      setDoc(doc(despachosCol, despachoToSave.id), despachoToSave).catch(err=>{
        console.error(err);
        toast("No se pudo guardar. Intenta de nuevo.");
      });
      const idx = state.despachos.findIndex(x=>x.id===despachoToSave.id);
      if(idx>=0) state.despachos[idx] = despachoToSave;
      else state.despachos.unshift(despachoToSave);

      state.viewingDespachoId = despachoToSave.id;
      state.despachoDraft = null;
      state.despachoEditing = false;
      state.view = "despachoDetail";
      render();
      toast(navigator.onLine ? (wasEditing ? "Cambios guardados" : "Despacho guardado") : "Guardado — se subirá cuando vuelva la señal");
    };
    formEl.addEventListener("submit", guardarDespacho);
    const btnGuardarDespacho = document.getElementById("btnGuardarDespacho");
    if(btnGuardarDespacho) btnGuardarDespacho.addEventListener("click", (e)=>{ guardarDespacho(e); });
  }

  if(state.view==="despachoDetail"){
    document.getElementById("btnBack").onclick = ()=>{ state.view="despachos"; state.viewingDespachoId=null; render(); };
    document.getElementById("btnEditDespacho").onclick = ()=>{
      const d = state.despachos.find(x=>x.id===state.viewingDespachoId);
      if(!d) return;
      state.despachoTipo = d.tipo;
      state.despachoDraft = { ...d };
      state.despachoEditing = true;
      state.view = "despachoForm";
      render();
    };
    document.getElementById("btnDelDespacho").onclick = ()=>{
      if(confirm("¿Eliminar este despacho? Esta acción no se puede deshacer.")){
        const idToDelete = state.viewingDespachoId;
        deleteDoc(doc(despachosCol, idToDelete)).catch(err=>{
          console.error(err);
          toast("No se pudo eliminar. Intenta de nuevo.");
        });
        state.despachos = state.despachos.filter(x=>x.id!==idToDelete);
        state.view = "despachos";
        state.viewingDespachoId = null;
        render();
        toast("Despacho eliminado");
      }
    };
  }

  if(state.view==="form1"){
    document.getElementById("btnBack").onclick = ()=>{ state.view="home"; state.draft=null; state.editing=false; render(); };
    const form1 = document.getElementById("formStep1");
    // Quita el estado de error apenas el usuario corrige el campo
    form1.querySelectorAll(".control").forEach(el=>{
      el.addEventListener("input", ()=>{
        const wrap = el.closest(".field");
        if(wrap){ wrap.classList.remove("has-error"); el.classList.remove("invalid"); }
      });
      el.addEventListener("change", ()=>{
        const wrap = el.closest(".field");
        if(wrap){ wrap.classList.remove("has-error"); el.classList.remove("invalid"); }
      });
    });

    const goToStep2 = (e)=>{
      if(e) e.preventDefault();
      // Se lee cada campo directamente por su id: más confiable que FormData
      // en algunos navegadores móviles antiguos.
      const vals = {
        supervisor: (document.getElementById("fldSupervisor")||{}).value || "",
        fecha:      (document.getElementById("fldFecha")||{}).value || "",
        hora:       (document.getElementById("fldHora")||{}).value || "",
        equipo:     (document.getElementById("fldEquipo")||{}).value || "",
        finca:      (document.getElementById("fldFinca")||{}).value || "",
      };
      const checks = [
        { field:"supervisor", ok: !!vals.supervisor },
        { field:"fecha",      ok: !!vals.fecha && !!vals.hora },
        { field:"equipo",     ok: !!vals.equipo },
        { field:"finca",      ok: !!vals.finca },
      ];
      let firstInvalid = null;
      checks.forEach(c=>{
        const wrap = document.querySelector(`#formStep1 [data-field="${c.field}"]`);
        if(!wrap) return;
        if(!c.ok){
          wrap.classList.add("has-error");
          wrap.querySelectorAll(".control").forEach(el=>el.classList.add("invalid"));
          if(!firstInvalid) firstInvalid = wrap;
        } else {
          wrap.classList.remove("has-error");
          wrap.querySelectorAll(".control").forEach(el=>el.classList.remove("invalid"));
        }
      });
      if(firstInvalid){
        firstInvalid.scrollIntoView({ behavior:"smooth", block:"center" });
        const el = firstInvalid.querySelector(".control");
        if(el) el.focus({ preventScroll:true });
        toast("Completa los campos obligatorios");
        return;
      }
      Object.assign(state.draft, vals);
      state.view = "form2";
      render();
    };

    form1.addEventListener("submit", goToStep2);
    // Respaldo: si por algún motivo el evento submit no dispara en el
    // navegador del dispositivo, el clic directo en el botón también funciona.
    const btnSiguiente = document.getElementById("btnSiguiente");
    if(btnSiguiente){
      btnSiguiente.addEventListener("click", (e)=>{ goToStep2(e); });
    }
  }

  if(state.view==="form2"){
    document.getElementById("btnBack").onclick = ()=>{ state.view="form1"; render(); };
    document.getElementById("btnAtras2").onclick = ()=>{ state.view="form1"; render(); };
    document.querySelectorAll("[data-add]").forEach(btn=>{
      btn.onclick = ()=> openAddItemModal(btn.dataset.add);
    });
    document.querySelectorAll("[data-del]").forEach(btn=>{
      btn.onclick = ()=>{
        state.draft.items = state.draft.items.filter(i=>i.itemId!==btn.dataset.del);
        render();
      };
    });
    const btnGuardar = document.getElementById("btnGuardar");
    if(btnGuardar) btnGuardar.onclick = ()=>{
      const wasEditing = state.editing;
      const reportToSave = { ...state.draft };
      if(wasEditing) reportToSave.actualizado = new Date().toISOString();
      // setDoc funciona igual con o sin señal: si no hay internet, Firestore
      // lo guarda en el celular y lo sube solo apenas vuelva la conexión.
      setDoc(doc(reportsCol, reportToSave.id), reportToSave).catch(err=>{
        console.error(err);
        toast("No se pudo guardar. Intenta de nuevo.");
      });
      const idx = state.reports.findIndex(r=>r.id===reportToSave.id);
      if(idx>=0) state.reports[idx] = reportToSave;
      else state.reports.unshift(reportToSave);
      state.viewingId = reportToSave.id;
      state.draft = null;
      state.editing = false;
      state.view = "detail";
      render();
      toast(navigator.onLine ? (wasEditing ? "Cambios guardados" : "Registro guardado") : "Guardado — se subirá cuando vuelva la señal");
    };
  }

  if(state.view==="detail"){
    document.getElementById("btnBack").onclick = ()=>{ state.view="home"; state.viewingId=null; render(); };
    document.getElementById("btnEditReport").onclick = ()=>{
      const r = state.reports.find(x=>x.id===state.viewingId);
      if(!r) return;
      state.draft = {
        ...r,
        items: r.items.map(it=>({...it})),
      };
      state.editing = true;
      state.view = "form1";
      render();
    };
    document.getElementById("btnDelReport").onclick = ()=>{
      if(confirm("¿Eliminar este registro? Esta acción no se puede deshacer.")){
        const idToDelete = state.viewingId;
        deleteDoc(doc(reportsCol, idToDelete)).catch(err=>{
          console.error(err);
          toast("No se pudo eliminar. Intenta de nuevo.");
        });
        state.reports = state.reports.filter(r=>r.id!==idToDelete);
        state.view = "home";
        state.viewingId = null;
        render();
        toast("Registro eliminado");
      }
    };
  }

  document.getElementById("overlay").onclick = (e)=>{
    if(e.target.id==="overlay") closeModal();
  };
}

/* =========================================================
   EXPORTAR A CSV (abre en Excel)
   ========================================================= */
function downloadCSV(rows, filename){
  const csv = rows.map(row=> row.map(v=>{
    const s = String(v ?? "");
    return /[",;\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(";")).join("\n");
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("Exportado a CSV/Excel");
}

function exportCSV(){
  if(state.reports.length===0){ toast("No hay registros para exportar"); return; }
  const headers = ["Supervisor","Fecha","Hora","Finca","Equipo","Producto","Medida","Unidades","Toneladas"];
  const rows = [headers];
  state.reports.forEach(r=>{
    if(r.items.length===0){
      rows.push([r.supervisor,r.fecha,r.hora,r.finca,r.equipo,"","","",""]);
    } else {
      r.items.forEach(it=>{
        rows.push([r.supervisor,r.fecha,r.hora,r.finca,r.equipo, productoById(it.productoId).nombre, it.medida, it.unidades, it.toneladas]);
      });
    }
  });
  downloadCSV(rows, `cosechas_export_${new Date().toISOString().slice(0,10)}.csv`);
}

function exportDespachosCSV(){
  if(state.despachos.length===0){ toast("No hay despachos para exportar"); return; }
  const headers = ["Tipo","Cliente","Producto","Proceso","Diámetro/Espesor","Largo","Fecha","Hora","Remisión","Placa","Toneladas","Unidades"];
  const rows = [headers];
  state.despachos.forEach(d=>{
    rows.push([
      DESPACHO_TIPOS[d.tipo].label, d.cliente, d.producto, d.proceso||"", d.diametro||"", d.largo||"",
      d.fecha, d.hora, d.remision||"", d.placa||"", d.toneladas||"", d.unidades||"",
    ]);
  });
  downloadCSV(rows, `despachos_export_${new Date().toISOString().slice(0,10)}.csv`);
}


/* =========================================================
   MANEJO DE ERRORES VISIBLE
   (para que ningún fallo pase "en silencio" en el dispositivo)
   ========================================================= */
window.addEventListener("error", (ev)=>{
  console.error(ev.error || ev.message);
  toast("Ocurrió un error. Intenta de nuevo.");
});

/* Registro del Service Worker: permite instalar la app y que
   funcione sin internet después de la primera visita.
   Si se abre como archivo local (file://) esto se ignora
   automáticamente sin romper nada. */
if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });

  // Cuando hay una versión nueva, el navegador la instala en segundo plano.
  // Apenas esa versión nueva "toma control" de la página, recargamos solos
  // para mostrarla — así nadie tiene que desinstalar/reinstalar la app.
  let swRefreshing = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });
}

/* =========================================================
   INICIO
   ========================================================= */
render();
updateNetBanner();
